services:

  db:
    image: postgres:15-alpine
    container_name: devcorp-postgres
    environment:
      POSTGRES_DB: devcorp
      POSTGRES_USER: zahra
      POSTGRES_PASSWORD: devcorp123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: devcorp-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/devcorp
      SPRING_DATASOURCE_USERNAME: zahra
      SPRING_DATASOURCE_PASSWORD: devcorp123
    depends_on:
      - db

volumes:
  postgres_data: